name: market-mem

services:
  falkordb:
    image: falkordb/falkordb:latest
    expose: ["6379"]
    ports:
      - "127.0.0.1:3000:3000"
    networks: [mem-net]
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  mcp:
    build:
      context: ./mcp
    ports:
      - "${MEM_HOST:-127.0.0.1}:${MEM_PORT:-7333}:7333"
    networks: [mem-net]
    volumes:
      # Bind-mount repos read-only at the same path so code_fetch can read host files.
      # macOS: set REPOS_ROOT=/Users  Linux: set REPOS_ROOT=/home or /
      - "${REPOS_ROOT:-/Users}:${REPOS_ROOT:-/Users}:ro"
      # Persistent model cache — downloaded once, reused across restarts.
      - embed-models:/data/models
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      CODE_EMBED_MODEL: "${CODE_EMBED_MODEL:-microsoft/graphcodebert-base}"
      MEMORY_EMBED_MODEL: "${MEMORY_EMBED_MODEL:-nomic-ai/nomic-embed-text-v1.5}"
      MAX_DIM: "${MAX_DIM:-2048}"
    depends_on:
      falkordb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7333/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

networks:
  mem-net:
    driver: bridge

volumes:
  falkordb_data:
  embed-models:
